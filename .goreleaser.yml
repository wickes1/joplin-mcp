version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    flags:
      - -trimpath

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'typo'

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

# NOTE: brews is deprecated in GoReleaser v2.10+ (replaced by homebrew_casks).
# Keeping brews for now — Formula is the correct Homebrew concept for CLI tools.
# Will migrate when GoReleaser v3 drops or if brews stops working.
brews:
  - repository:
      owner: wickes1
      name: homebrew-tap
    directory: Formula
    homepage: https://github.com/wickes1/joplin-mcp
    description: "MCP server connecting AI assistants to Joplin for note management"
    license: MIT
    install: |
      bin.install "joplin-mcp"
    test: |
      assert_match "JOPLIN_TOKEN", shell_output("#{bin}/joplin-mcp 2>&1", 1)
